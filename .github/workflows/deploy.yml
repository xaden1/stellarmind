name: CI/CD — Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow one concurrent deployment; cancel in-progress ones if a new push arrives
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build (runs on every push & PR) ────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (if script exists)
        run: npm run lint --if-present

      - name: Build for GitHub Pages
        # Set VITE_BASE_PATH so vite uses /stellarmind/ as the asset base path.
        # Only set this for production builds — local dev always uses '/'.
        run: npm run build
        env:
          VITE_BASE_PATH: /stellarmind/
          # Expose API keys as empty strings during CI build so Vite doesn't fail.
          # The app falls back to Mock Mode when keys are missing at runtime.
          VITE_ANTHROPIC_API_KEY: ''
          VITE_HORIZON_URL: https://horizon-testnet.stellar.org

      - name: Upload Pages artifact
        # Only upload artifact on pushes to main (not PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  # ─── Deploy (push to main only) ─────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
